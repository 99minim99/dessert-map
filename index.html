<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘의 푸딩 추천</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=64c37f644299d875323a80d41b3ece10&libraries=services"></script>
    <style>
        :root { --pudding-yellow: #FFED99; --pudding-brown: #634832; --pudding-cream: #FFF9E3; --point-red: #FF6B6B; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; background-color: var(--pudding-cream); color: var(--pudding-brown); }
        
        /* 메인 컨테이너 */
        .container { max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; display: flex; flex-direction: column; min-height: 100vh; box-sizing: border-box; }
        h1 { font-size: 24px; margin-top: 40px; color: var(--pudding-brown); }
        .subtitle { font-size: 14px; opacity: 0.8; margin-bottom: 30px; }

        /* 기분 선택 버튼들 */
        .mood-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .mood-btn { padding: 15px 10px; border: 2px solid var(--pudding-yellow); background: white; border-radius: 12px; cursor: pointer; font-size: 14px; color: var(--pudding-brown); transition: 0.2s; }
        .mood-btn:hover { background: var(--pudding-yellow); }

        /* 결과 화면 (처음엔 숨김) */
        #result-screen { display: none; background: white; border-radius: 20px; padding: 30px 20px; border: 3px dashed var(--pudding-yellow); position: relative; margin-top: 20px; }
        .pudding-icon { font-size: 60px; margin-bottom: 10px; }
        .recommended-item { font-size: 28px; font-weight: bold; color: var(--point-red); margin: 10px 0; }
        
        /* 버튼 스타일 */
        .action-btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
        .go-map { background: var(--point-red); color: white; }
        .retry { background: #eee; color: #666; }

        /* 지도 화면 (숨김) */
        #map-container { display: none; height: 100vh; position: relative; }
        #map { width: 100%; height: 100%; }
        .back-home { position: absolute; top: 10px; left: 10px; z-index: 10; padding: 10px; background: white; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="main-screen" class="container">
        <h1>오늘 뭐 먹지?</h1>
        <p class="subtitle">지금 기분에 딱 맞는 디저트를 찾아드릴게요! 🍮</p>
        
        <div class="mood-grid">
            <button class="mood-btn" onclick="pickDessert('행복해')">😊 행복해</button>
            <button class="mood-btn" onclick="pickDessert('우울해')">😢 우울해</button>
            <button class="mood-btn" onclick="pickDessert('당 떨어져')">🔋 당부족</button>
            <button class="mood-btn" onclick="pickDessert('심심해')">😐 심심해</button>
            <button class="mood-btn" onclick="pickDessert('스트레스')">🔥 스트레스</button>
            <button class="mood-btn" onclick="pickDessert('피곤해')">🥱 피곤해</button>
        </div>

        <div id="result-screen">
            <div class="pudding-icon">🍮</div>
            <div id="mood-text" style="font-size: 14px;"></div>
            <div id="dessert-name" class="recommended-item"></div>
            <p style="font-size: 13px;">선택하신 기분에 딱 맞는 메뉴예요! ✨</p>
            
            <button class="action-btn go-map" onclick="showMap()">카페 찾으러 가기</button>
            <button class="action-btn retry" onclick="resetAll()">다른 거 먹을래</button>
        </div>
    </div>

    <div id="map-container">
        <button class="back-home" onclick="resetAll()">◀ 처음으로</button>
        <div id="map"></div>
    </div>

    <script>
        const dessertList = ["커스터드 푸딩", "초코 수플레", "딸기 마카롱", "소금빵", "치즈 케이크", "티라미수", "에그타르트", "휘낭시에"];
        let selectedDessert = "";

        // 랜덤 디저트 추천 함수
        function pickDessert(mood) {
            selectedDessert = dessertList[Math.floor(Math.random() * dessertList.length)];
            document.getElementById('mood-text').innerText = `'${mood}' 한 당신을 위한 추천!`;
            document.getElementById('dessert-name').innerText = selectedDessert;
            document.getElementById('result-screen').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }

        // 모든 상태 초기화
        function resetAll() {
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('map-container').style.display = 'none';
            window.scrollTo(0, 0);
        }

        // 지도 보여주기 및 검색
        function showMap() {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('map-container').style.display = 'block';
            
            // 지도 초기화 (Vercel 주소 등록 확인 필수!)
            const container = document.getElementById('map');
            const options = { center: new kakao.maps.LatLng(37.566826, 126.9786567), level: 3 };
            const map = new kakao.maps.Map(container, options);
            const ps = new kakao.maps.services.Places();

            // 내 위치 기반 검색
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    const moveLatLon = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                    map.setCenter(moveLatLon);
                    ps.keywordSearch(selectedDessert + ' 카페', placesSearchCB, { location: moveLatLon, radius: 2000 });
                });
            }

            function placesSearchCB(data, status) {
                if (status === kakao.maps.services.Status.OK) {
                    for (let i=0; i<data.length; i++) {
                        new kakao.maps.Marker({ map: map, position: new kakao.maps.LatLng(data[i].y, data[i].x) });
                    }
                }
            }
        }
    </script>
</body>
</html>
